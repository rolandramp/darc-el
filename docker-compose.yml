services:
  darc-el-backend:
    build:
      context: .
      dockerfile: darc-el-backend/Dockerfile
    container_name: darc-el-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

  darc-el-ui:
    build:
      context: .
      dockerfile: darc-el-ui/Dockerfile
    container_name: darc-el-ui
    environment:
      - BACKEND_BASE_URL=http://darc-el-backend:8000
      - DJANGO_DEBUG=true
    depends_on:
      darc-el-backend:
        condition: service_started
    ports:
      - "8081:8081"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8081/', timeout=5)",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  neo4j-kg:
    build:
      context: ./dockerimage/neo4j
      dockerfile: Dockerfile
    container_name: neo4j-kg
    ports:
      - "7687:7687"
      - "7474:7474"
      - "7475:7475"
    environment:
      - NEO4J_server_bolt_listen__address=:7687
      - NEO4J_server_http_listen__address=:7474
      - NEO4J_server_https_listen__address=:7475
      - NEO4J_AUTH=neo4j/pass4neo
    volumes:
      - ./dockerimage/neo4j/data:/var/lib/neo4j/import
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:7474/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
  ollama-backend:
    build:
      context: ./dockerimage/ollama
      dockerfile: Dockerfile
    container_name: ollama-llm
    environment:
      - OLLAMA_MODEL=ministral-3:3b
      - OLLAMA_EMBED=nomic-embed-text
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "6543:11434"
    healthcheck:
      test: ["CMD-SHELL", "ollama list | grep ministral-3:3b || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 600s
  llama-cpp-backend:
    profiles: ["gpu"]
    build:
      context: dockerimage/llama-cpp
      dockerfile: Dockerfile
    container_name: llama-cpp-llm
    restart: unless-stopped
    ports:
      - "1235:8080"
    # GPU: Reserve/enable GPUs for this service.
    # comment out if you want to run on CPU only.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: ["gpu"]
    # Persistent volume for downloaded models: map to the image cache dir used by llama.cpp
    volumes:
      - llamacpp_models:/root/.cache/llama.cpp
    environment:
      - HF_HOME=/root/.cache/llama.cpp
    # Pass only the server networking arguments; model selection now comes from app-side config.
    command: ["-hf", "mistralai/Ministral-3-3B-Instruct-2512-GGUF:Q4_K_M", "--port", "8080", "--host", "0.0.0.0"]
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

volumes:
  ollama_data:
  neo4j_data:
  neo4j_logs:
  llamacpp_models:
