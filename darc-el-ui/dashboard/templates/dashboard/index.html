<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DARC-EL UI Dashboard</title>
    <style>
        :root {
            --bg: #f7f4ee;
            --surface: #ffffff;
            --text: #1a1f1e;
            --accent: #146356;
            --muted: #60706c;
            --danger: #b3261e;
            --border: #d9e2df;
        }
        body {
            margin: 0;
            font-family: "Segoe UI", "Calibri", sans-serif;
            background: radial-gradient(circle at top right, #dff0eb, var(--bg) 45%);
            color: var(--text);
        }
        .page {
            max-width: 980px;
            margin: 0 auto;
            padding: 2.5rem 1rem 4rem;
        }
        h1 { margin: 0 0 0.4rem; }
        p { color: var(--muted); }
        .grid {
            display: grid;
            gap: 1rem;
            grid-template-columns: repeat(auto-fit, minmax(290px, 1fr));
            margin-top: 1.4rem;
        }
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1rem;
            box-shadow: 0 6px 22px rgba(20, 99, 86, 0.08);
        }
        .title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 600;
            margin-bottom: 0.8rem;
        }
        .pill {
            border-radius: 999px;
            padding: 0.2rem 0.55rem;
            font-size: 0.82rem;
            background: #e4f3ef;
            color: var(--accent);
        }
        pre {
            margin: 0;
            white-space: pre-wrap;
            word-break: break-word;
            background: #fbfdfc;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 0.8rem;
            font-size: 0.88rem;
            line-height: 1.35;
        }
        .error {
            color: var(--danger);
            font-weight: 600;
        }
        @media (max-width: 680px) {
            .page { padding-top: 1.25rem; }
        }
    </style>
</head>
<body>
    <main class="page">
        <h1>DARC-EL UI</h1>
        <p>Backend target: {{ backend_base_url }}</p>

        <section class="grid">
            <article class="card">
                <div class="title">
                    <span>Backend Health</span>
                    <span class="pill">GET /health</span>
                </div>
                {% if health_error %}
                    <p class="error">{{ health_error }}</p>
                {% else %}
                    <pre>{{ health_payload }}</pre>
                {% endif %}
            </article>

            <article class="card">
                <div class="title">
                    <span>LLM Registry Status</span>
                    <span class="pill">GET /llm/status</span>
                </div>
                {% if llm_error %}
                    <p class="error">{{ llm_error }}</p>
                {% else %}
                    <pre>{{ llm_payload }}</pre>
                {% endif %}
            </article>
        </section>
    </main>
</body>
</html>
